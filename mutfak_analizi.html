<script>
var M=JSON.parse(document.getElementById("jd").textContent);

var th="<div class=\"tabs\">";
tabIds.forEach(function(id,i){th+="<button class=\"tab-btn"+(i===0?" active":"")+"\" onclick=\"switchTab('"+id+"')\">"+tabNames[i]+"</button>";});
th+="</div>";

// BASKET TAB
th+="<div class=\"tab-panel active\" id=\"tab-basket\">";
th+="<div class=\"st gold\">\u00dcr\u00fcn Birliktelik Analizi</div>";
th+="<div style=\"font-size:11px;color:var(--tx3);margin-bottom:12px\">"+M.toplam_masa+" masadan analiz edildi. Hangi \u00fcr\u00fcnler birlikte sipari\u015f ediliyor?</div>";

// Öneriler kutusu
if(M.oneriler && M.oneriler.length>0){
  th+="<div style=\"background:var(--gd);border-radius:10px;padding:14px;margin-bottom:16px\">";
  th+="<div style=\"font-size:13px;font-weight:600;color:var(--gold);margin-bottom:8px\">\ud83d\udca1 Garson \u00d6nerileri</div>";
  M.oneriler.forEach(function(o){
    th+="<div class=\"oneri-card\"><span>"+o.kaynak+"</span> <span class=\"oneri-arrow\">\u2192</span> <span>"+o.hedef+"</span> <span class=\"pill hi\">%"+o.oran+"</span></div>";
  });
  th+="</div>";
}

// Pair kartları
M.basket.slice(0,15).forEach(function(p,i){
  var liftCls=p.lift>=1.5?"hi":(p.lift>=1?"md":"lo");
  th+="<div class=\"pair-card\"><div class=\"pair-top\"><div class=\"pair-names\">"+(i+1)+". "+p.urun_a+" <span class=\"pair-plus\">+</span> "+p.urun_b+"</div><div><span class=\"pill "+liftCls+"\">"+p.birlikte+"x birlikte</span></div></div>";
  th+="<div class=\"pair-stats\"><div>Support: <span class=\"val\">%"+p.support+"</span></div><div>"+p.urun_a+"\u2192"+p.urun_b+": <span class=\"val\">%"+p.conf_a_b+"</span></div><div>"+p.urun_b+"\u2192"+p.urun_a+": <span class=\"val\">%"+p.conf_b_a+"</span></div><div>Lift: <span class=\"val\">"+p.lift+"</span></div></div></div>";
});

// Günlük çeşitlilik tablosu

M.gunluk_cesit.forEach(function(g){
  th+="<tr><td>"+g.tarih+"</td><td>"+g.gun+"</td><td class=\"nm\">"+g.masa_sayisi+"</td><td class=\"nm\" style=\"font-weight:600\">"+g.ort_cesit+"</td><td class=\"nm\">"+g.max_cesit+"</td><td class=\"nm\">"+g.ort_adet+"</td><td class=\"nm\">"+fmt(g.ort_tutar)+" \u20ba</td></tr>";
});
th+="</tbody></table></div>";

// Saat bazlı çeşitlilik chart
th+="<div class=\"chart-box\"><div style=\"font-size:13px;font-weight:600;margin-bottom:8px\">Saat Bazl\u0131 Mutfak Y\u00fck\u00fc</div><canvas id=\"chart-saat-cesit\" height=\"180\"></canvas></div>";

// Saat detay tablosu
th+="<div class=\"tw\"><table><thead><tr><th>Saat</th><th class=\"nm\">Masa</th><th class=\"nm\">Ort \u00c7e\u015fit</th><th class=\"nm\">Ort Adet</th><th class=\"nm\">Max \u00c7e\u015fit</th><th class=\"nm\">Mutfak Y\u00fck\u00fc</th></tr></thead><tbody>";

    th+="<div class=\"pair-card\"><div class=\"pair-top\"><div class=\"pair-names\">"+u.urun+"</div><div><span style=\"font-size:13px;font-weight:600;"+oranCls+"\">"+u.iade+" iade / "+u.satis+" sat\u0131\u015f (%"+u.iade_oran+")</span></div></div>";
    if(u.nedenler.length>0){
      th+="<div style=\"margin-top:6px;font-size:11px;color:var(--tx2)\">";
      u.nedenler.forEach(function(n){th+="<span class=\"pill lo\" style=\"margin:2px\">"+n.neden+" ("+n.adet+")</span> ";});
      th+="</div>";
    }
    th+="</div>";
  });
} else {
  th+="<div style=\"color:var(--tx3);padding:20px;text-align:center\">Bu d\u00f6nemde iade kayd\u0131 yok</div>";
}
th+="</div>";

// ICGORU TAB
th+="<div class=\"tab-panel\" id=\"tab-icgoru\">";
th+="<div class=\"st blu\">Mutfak \u0130\u00e7g\u00f6r\u00fcleri</div>";
if(M.icgoruler.length>0){
  M.icgoruler.forEach(function(g){
    th+="<div class=\"insight-box "+g.onem+"\">"+g.mesaj+"</div>";
  });
} else {
  th+="<div style=\"color:var(--tx3);padding:20px;text-align:center\">Hen\u00fcz i\u00e7g\u00f6r\u00fc yok</div>";
}
th+="</div>";

document.getElementById("mn").innerHTML=th;

function switchTab(id){
  document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});
  document.querySelectorAll(".tab-panel").forEach(function(p){p.classList.remove("active");});
  document.getElementById("tab-"+id).classList.add("active");
  event.target.classList.add("active");
  // Chart çiz
  if(id==="cesitlilik")drawSaatChart();
}

function drawSaatChart(){
  var ctx=document.getElementById("chart-saat-cesit");
  if(!ctx||ctx.dataset.drawn)return;
  ctx.dataset.drawn="1";
  var sc=M.saat_cesit;
  new Chart(ctx,{type:"bar",data:{
    labels:sc.map(function(s){return String(s.saat).padStart(2,"0")+":00"}),
    datasets:[
      {label:"Masa Say\u0131s\u0131",data:sc.map(function(s){return s.masa}),backgroundColor:"rgba(96,165,250,0.6)",borderRadius:4,yAxisID:"y"},
      {label:"Ort \u00c7e\u015fit",data:sc.map(function(s){return s.ort_cesit}),type:"line",borderColor:"#34D399",backgroundColor:"rgba(52,211,153,0.1)",tension:0.3,pointRadius:4,yAxisID:"y1"}
    ]
  },options:{responsive:true,plugins:{legend:{labels:{color:"#8B95B0"}}},scales:{
    y:{position:"left",ticks:{color:"#8B95B0"},grid:{color:"#2A3352"},title:{display:true,text:"Masa",color:"#8B95B0"}},
    y1:{position:"right",ticks:{color:"#8B95B0"},grid:{display:false},title:{display:true,text:"\u00c7e\u015fit",color:"#8B95B0"}},
    x:{ticks:{color:"#8B95B0"},grid:{display:false}}
  }}});
}
