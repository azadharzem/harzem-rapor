  ctx.dataset.drawn="1";
  var sp=M.saat_profil;
  new Chart(ctx,{type:"bar",data:{
    labels:sp.map(function(s){return String(s.saat).padStart(2,"0")+":00"}),

      {label:"Toplam Ciro",data:sp.map(function(s){return s.toplam_ciro}),backgroundColor:"rgba(52,211,153,0.6)",borderRadius:4,yAxisID:"y"},

    y1:{position:"right",ticks:{color:"#8B95B0",callback:function(v){return fmt(v)}},grid:{display:false},title:{display:true,text:"Ki\u015fi Ba\u015f\u0131 \u20ba",color:"#8B95B0"}},

}
