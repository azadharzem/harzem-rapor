var gs=D.garsonlar||[];
var topC=gs.reduce(function(s,g){return s+g.ciro},0);
h+="<div class=\"tw\"><div class=\"tt\"><div class=\"dot\" style=\"background:var(--gold)\"></div>Garson Detay</div><table><thead><tr><th>#</th><th>Garson</th><th class=\"nm\">Ciro</th><th class=\"nm\">M\u00fc\u015fteri</th><th class=\"nm\">Ki\u015fi Ba\u015f\u0131</th><th class=\"nm\">Pay</th></tr></thead><tbody>";
gs.forEach(function(g,i){
  var pay=topC>0?(g.ciro/topC*100).toFixed(1):"0";
  h+="<tr><td>"+rk(i)+"</td><td style=\"font-weight:500\">"+g.ad+"</td><td class=\"nm\">"+fmtTL(g.ciro)+"</td><td class=\"nm\">"+g.kisi+"</td><td class=\"nm\">"+fmtTL(g.kisi_basi||0)+"</td><td class=\"nm\">%"+pay+"</td></tr>";
});
h+="</tbody></table></div>";
h+=noteBox("garson",D.tarih);

// SAAT
h+="<div class=\"st grn\">Saat Bazl\u0131 Yo\u011funluk</div>";
var sd=D.saat_dagilim||{};
var sks=Object.keys(sd).sort(function(a,b){return parseInt(a)-parseInt(b)});
var msp=Math.max.apply(null,sks.map(function(k){return sd[k].siparis_sayisi||0}))||1;
sks.forEach(function(k){
  var sp=sd[k].siparis_sayisi||0;
  var pw=(sp/msp*100).toFixed(1);
  var cl=sp/msp>0.6?"var(--grn)":sp/msp>0.3?"var(--gold)":"var(--sf3)";
  h+=bar(("0"+k).slice(-2)+":00",pw,cl,sp+" sipari\u015f",50);
});
h+=noteBox("saat",D.tarih);

// URUNLER
h+="<div class=\"tc\"><div>";
h+="<div class=\"st org\">En \u00c7ok Satanlar</div>";
var tu=D.top_urunler||[];
var mut=tu.length>0?Math.max.apply(null,tu.map(function(u){return u.tutar})):1;
tu.slice(0,10).forEach(function(u,i){
  var pw=(u.tutar/mut*100).toFixed(1);
  var cl=i<3?"var(--gold)":i<6?"var(--grn)":"var(--blu)";
  h+=bar(rk(i)+" "+u.urun,pw,cl,fmt(u.adet)+"x "+fmtTL(u.tutar),160);
});
h+="</div><div>";
h+="<div class=\"st org\">\u0130kramlar</div>";
var ik=D.ikram_urunleri||[];
if(ik.length>0){
  h+="<div class=\"tw\"><table><thead><tr><th>\u00dcr\u00fcn</th><th class=\"nm\">Adet</th></tr></thead><tbody>";
  ik.forEach(function(r){h+="<tr><td>"+r[0]+"</td><td class=\"nm\">"+r[1]+"</td></tr>";});
  h+="</tbody></table></div>";
} else {h+="<div style=\"color:var(--tx3);font-size:12px\">Bug\u00fcn ikram yok</div>";}
h+="</div></div>";
h+=noteBox("urun",D.tarih);

// IADE
var ret=D.return_detay||[];
if(ret.length>0){
  h+="<div class=\"st red\">\u0130ade Detaylar\u0131</div>";
  h+="<div class=\"tw\"><table><thead><tr><th>Masa</th><th>\u00dcr\u00fcn</th><th>Adet</th><th>A\u00e7\u0131klama</th></tr></thead><tbody>";
  ret.forEach(function(r){
    h+="<tr><td>"+r.masa+"</td><td>"+r.urun+"</td><td class=\"nm\">"+(r.miktar||1)+"</td><td style=\"font-size:11px;color:var(--tx2)\">"+(r.aciklama||"-")+"</td></tr>";
  });
  h+="</tbody></table></div>";
  h+=noteBox("iade",D.tarih);
}

// ODENMEZLER
var odm=D.odenmezler||[];
if(odm.length>0 && D.odenmez_toplam>0){
  h+="<div class=\"st prp\">\u00d6denmezler</div>";
  h+="<div class=\"kg\"><div class=\"kpi red\"><div class=\"kl\">\u00d6DENMEZ TOPLAM</div><div class=\"kv\">"+fmtTL(D.odenmez_toplam)+"</div><div class=\"ks\">Cironun %"+D.odenmez_oran+"'i</div></div></div>";
  h+="<div class=\"tw\"><table><thead><tr><th>A\u00e7\u0131klama</th><th class=\"nm\">Adet</th><th class=\"nm\">Tutar</th></tr></thead><tbody>";
  odm.forEach(function(o){
    if(o.tutar>0) h+="<tr><td>"+o.ad+"</td><td class=\"nm\">"+o.adet+"</td><td class=\"nm\">"+fmtTL(o.tutar)+"</td></tr>";
  });
  h+="</tbody></table></div>";
  h+=noteBox("odenmez",D.tarih);
}

// MASA
var ms=D.masa_doluluk||[];
if(ms.length>0){
  h+="<div class=\"st blu\">Masa Analizi</div>";
  var msS=ms.filter(function(m){return m.toplam_gelir>0}).sort(function(a,b){return b.toplam_gelir-a.toplam_gelir});
  var mmx=msS.length>0?msS[0].toplam_gelir:1;
  msS.slice(0,15).forEach(function(m){
    h+=bar(m.masa,(m.toplam_gelir/mmx*100).toFixed(1),"var(--blu)",fmtTL(m.toplam_gelir)+" \u00b7 "+Math.round(m.toplam_kisi)+"k",50);
  });
}

// ANOMALI + ONERI
h+="<div class=\"tc\"><div>";
h+="<div class=\"st red\">Anomaliler</div>";
var anm=D.anomaliler||[];
if(anm.length>0){anm.forEach(function(a){h+="<div class=\"an\"><div class=\"ic\">!</div><div>"+a.mesaj+"</div></div>";});}
else{h+="<div style=\"color:var(--tx3);font-size:12px\">Anomali yok \u2714</div>";}
h+="</div><div>";
h+="<div class=\"st grn\">\u00d6neriler</div>";
var onr=D.oneriler||[];
if(onr.length>0){onr.forEach(function(o){
  var oc=o.oncelik==="yuksek"?"hi":o.oncelik==="orta"?"md":"lo";
  h+="<div class=\"on "+oc+"\">"+o.oneri+"</div>";
});}
else{h+="<div style=\"color:var(--tx3);font-size:12px\">\u00d6neri yok</div>";}
h+="</div></div>";
h+=noteBox("genel_yorum",D.tarih);

document.getElementById("mn").innerHTML=h;
</script></body></html>
