*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--tx);font-family:"Segoe UI",system-ui,sans-serif}

.hdr h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--tx2);font-size:12px;margin-top:2px}.hdr .rt{text-align:right}.hdr .dt{font-size:16px;font-weight:600}.hdr .gn{font-size:13px;color:var(--gold)}
.mn{padding:20px 32px 40px;max-width:1200px;margin:0 auto}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.kpi.gold::before{background:var(--gold)}.kpi.grn::before{background:var(--grn)}.kpi.blu::before{background:var(--blu)}.kpi.red::before{background:var(--red)}.kpi.org::before{background:var(--org)}.kpi.prp::before{background:var(--prp)}
.kl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px;font-weight:500}.kv{font-size:20px;font-weight:700;margin:4px 0 2px}.ks{font-size:10px;color:var(--tx2)}
.tw{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:18px}
.tt{padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%}
table{width:100%;border-collapse:collapse}th{background:var(--sf2);color:var(--tx2);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--bd)}

.st{font-size:14px;font-weight:600;margin:22px 0 10px;display:flex;align-items:center;gap:8px}

.an .ic{width:18px;height:18px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0}
.on{border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:12px;display:flex;gap:8px}

h+="<div class=\"st blu\">Ki\u015fi Ba\u015f\u0131 Kar\u015f\u0131la\u015ft\u0131rma</div>";
var gsA=gs.filter(function(g2){return g2.ciro>0});var mkb=Math.max.apply(null,gsA.map(function(g2){return g2.kisi_basi}));
gsA.forEach(function(r){h+=bar(r.ad,(r.kisi_basi/mkb*100).toFixed(1),r.kisi_basi>g.kisi_basi?"var(--grn)":"var(--org)",fmtTL(r.kisi_basi),80);});
h+="</div>";
// SAAT
h+="<div class=\"sec\" id=\"s-saat\"><div class=\"st grn\">Saat Bazl\u0131 Yo\u011funluk</div>";
var sa=D.saat_analiz;var sks2=Object.keys(sa).sort(function(a,b){return parseInt(a)-parseInt(b)});var msp2=Math.max.apply(null,sks2.map(function(k){return sa[k].siparis}));
sks2.forEach(function(k){var inf=sa[k];var pw=(inf.siparis/msp2*100).toFixed(1);var cl=inf.siparis/msp2>0.6?"var(--grn)":inf.siparis/msp2>0.3?"var(--gold)":"var(--sf3)";h+=bar(("0"+k).slice(-2)+":00",pw,cl,inf.siparis+" sip \u00b7 "+fmtTL(inf.tutar),50);});
h+="</div>";
// URUN
h+="<div class=\"sec\" id=\"s-urun\"><div class=\"st grn\">En \u00c7ok Satan \u00dcr\u00fcnler</div>";
var tu2=D.top_urunler;var mut2=Math.max.apply(null,tu2.map(function(u){return u.tutar}));
tu2.forEach(function(u,i){h+=bar(rk(i)+" "+u.urun,(u.tutar/mut2*100).toFixed(1),i<3?"var(--gold)":i<7?"var(--grn)":"var(--blu)",fmt(u.adet)+"x \u00b7 "+fmtTL(u.tutar),200);});
h+="<div class=\"tc\"><div><div class=\"st org\">\u0130kram \u00dcr\u00fcnleri</div><div class=\"tw\"><table><thead><tr><th>\u00dcr\u00fcn</th><th class=\"nm\">Adet</th></tr></thead><tbody>";
D.ikram_urunleri.forEach(function(r){h+="<tr><td>"+r[0]+"</td><td class=\"nm\">"+r[1]+"</td></tr>";});
h+="</tbody></table></div></div><div><div class=\"st prp\">Yemek/\u0130\u00e7ecek</div>";
var fd=D.fatura;var ty=0,ti=0;Object.keys(fd).forEach(function(k){ty+=fd[k].yemek||0;ti+=fd[k].icecek||0;});var tf=ty+ti;
if(tf>0){h+=bar("Yemek",(ty/tf*100).toFixed(1),"var(--prp)",fmtTL(ty),50);h+=bar("\u0130\u00e7ecek",Math.max(ti/tf*100,2).toFixed(1),"var(--blu)",fmtTL(ti),50);}
h+="</div></div></div>";
// MASA
h+="<div class=\"sec\" id=\"s-masa\"><div class=\"st blu\">Masa Gelir S\u0131ralamas\u0131</div>";
var md=D.masa_doluluk;var mt={};Object.keys(md).forEach(function(t){md[t].forEach(function(m){if(!mt[m.masa])mt[m.masa]={gelir:0,adisyon:0,kisi:0};mt[m.masa].gelir+=m.toplam_gelir||0;mt[m.masa].adisyon+=m.adisyon_sayisi||0;mt[m.masa].kisi+=m.toplam_kisi||0;});});
var ma=Object.keys(mt).map(function(k){return[k,mt[k]]}).sort(function(a,b){return b[1].gelir-a[1].gelir});var mmg=ma.length>0?ma[0][1].gelir:1;
ma.slice(0,20).forEach(function(e){h+=bar(e[0],(e[1].gelir/mmg*100).toFixed(1),"var(--blu)",fmtTL(e[1].gelir)+" \u00b7 "+Math.round(e[1].kisi)+"k",50);});
h+="</div>";
// KAYIP
h+="<div class=\"sec\" id=\"s-kayip\"><div class=\"kg\">";
h+=kpi("org","\u0130kram",fmtTL(g.toplam_ikram),pct(g.toplam_ikram,g.toplam_ciro));
h+=kpi("prp","\u0130ndirim",fmtTL(g.toplam_indirim),pct(g.toplam_indirim,g.toplam_ciro));
h+=kpi("red","\u0130ade",fmtTL(g.toplam_return),pct(g.toplam_return,g.toplam_ciro));
h+=kpi("red","Toplam",fmtTL(g.toplam_kayip),"%"+g.kayip_oran);
h+="</div><div class=\"st red\">Kay\u0131p Trendi</div>";
var mk=Math.max.apply(null,gl.map(function(r){return r.kayip}));
gl.forEach(function(r){h+=bar(r.tarih+"<br><span style=\"font-size:10px;color:var(--tx3)\">"+r.gun+"</span>",(mk>0?(r.kayip/mk*100).toFixed(1):"0"),"var(--red)",fmtTL(r.kayip)+" (%"+r.kayip_oran+")",110);});
h+="<div class=\"st org\">\u0130ade Detay</div><div class=\"tw\"><table><thead><tr><th>Tarih</th><th>Masa</th><th>\u00dcr\u00fcn</th><th>Adet</th><th>A\u00e7\u0131klama</th></tr></thead><tbody>";
var rd=D.return_detay;Object.keys(rd).forEach(function(t){rd[t].forEach(function(r){h+="<tr><td>"+t+"</td><td>"+r.masa+"</td><td>"+r.urun+"</td><td class=\"nm\">"+(r.miktar||1)+"</td><td style=\"font-size:11px;color:var(--tx2)\">"+(r.aciklama||"-")+"</td></tr>";});});
h+="</tbody></table></div></div>";
// ANOMALI
h+="<div class=\"sec\" id=\"s-anomali\"><div class=\"tc\"><div><div class=\"st red\">Anomaliler</div>";
D.anomaliler.forEach(function(a){h+="<div class=\"an\"><div class=\"ic\">!</div><div><div>"+a.mesaj+"</div><div style=\"font-size:10px;color:var(--tx3);margin-top:2px\">"+a.tarih+" "+(a.gun||"")+"</div></div></div>";});
h+="</div><div><div class=\"st grn\">Aksiyon \u00d6nerileri</div>";
D.oneriler.forEach(function(o){var oc=o.oncelik==="yuksek"?"hi":o.oncelik==="orta"?"md":"lo";h+="<div class=\"on "+oc+"\">"+o.oneri+"</div>";});
h+="</div></div></div>";
mnEl.innerHTML=h;
</script></body></html>
