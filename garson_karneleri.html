<script>
var K=JSON.parse(document.getElementById("jd").textContent);
var fmt=function(n){return n.toLocaleString("tr-TR",{maximumFractionDigits:0})};
var fmtTL=function(n){return fmt(n)+" \u20ba"};

function skorColor(s){
  if(s>=80)return"var(--gold)";if(s>=60)return"var(--grn)";if(s>=40)return"var(--org)";return"var(--red)";
}
function badgeCls(c){
  if(c==="Yildiz")return"star";if(c==="Iyi")return"good";if(c==="Gelisiyor")return"mid";return"low";
}
function badgeText(c){
  if(c==="Yildiz")return"\u2b50 Y\u0131ld\u0131z";if(c==="Iyi")return"\u2714 \u0130yi";if(c==="Gelisiyor")return"\u25b3 Geli\u015fiyor";return"\u26a0 Dikkat";
}

// KART LISTESI
var h="<div class=\"gk-grid\">";
K.forEach(function(k,i){
  var sc=skorColor(k.skor);
  h+="<div class=\"gk-card\" onclick=\"showDetail("+i+")\">";
  h+="<div class=\"gk-top\"><div class=\"gk-name\">"+k.ad+"</div><div class=\"gk-badge "+badgeCls(k.skor_sinif)+"\">"+badgeText(k.skor_sinif)+"</div></div>";
  h+="<div class=\"gk-skor\"><div class=\"gk-circle\" style=\"border:3px solid "+sc+";color:"+sc+"\">"+k.skor+"</div></div>";
  h+="<div class=\"gk-mini\">";
  h+="<div class=\"gk-mini-item\"><div class=\"val\">"+fmtTL(k.toplam_ciro)+"</div><div class=\"lbl\">Ciro</div></div>";
  h+="<div class=\"gk-mini-item\"><div class=\"val\">"+k.toplam_kisi+"</div><div class=\"lbl\">M\u00fc\u015fteri</div></div>";
  h+="<div class=\"gk-mini-item\"><div class=\"val\">"+fmtTL(k.kisi_basi)+"</div><div class=\"lbl\">Ki\u015fi Ba\u015f\u0131</div></div>";
  h+="<div class=\"gk-mini-item\"><div class=\"val\">"+k.aktif_gun+"/"+k.toplam_gun+"</div><div class=\"lbl\">Aktif G\u00fcn</div></div>";
  h+="</div>";
  // Skor barları
  var sd=k.skor_detay;
  var bars=[["Ciro",sd.ciro,30],["Ki\u015fi B.",sd.kisi_basi,25],["Tutarl\u0131l\u0131k",sd.tutarlilik,20],["Aktiflik",sd.aktiflik,15],["Kay\u0131p",sd.kayip,10]];
  h+="<div style=\"margin-top:10px\">";
  bars.forEach(function(b){
    var pw=(b[1]/b[2]*100).toFixed(0);
    h+="<div style=\"display:flex;align-items:center;gap:6px;margin:2px 0\"><div style=\"width:55px;font-size:9px;color:var(--tx3);text-align:right\">"+b[0]+"</div><div class=\"gk-bar\" style=\"flex:1\"><div class=\"gk-bar-fill\" style=\"width:"+pw+"%;background:"+sc+"\"></div></div><div style=\"width:20px;font-size:9px;color:var(--tx2)\">"+Math.round(b[1])+"</div></div>";
  });
  h+="</div></div>";
});
h+="</div>";

// MODAL
h+="<div class=\"modal-bg\" id=\"modal\"><div class=\"modal\"><button class=\"modal-close\" onclick=\"closeDetail()\">\u00d7</button><div id=\"modal-content\"></div></div></div>";

document.getElementById("mn").innerHTML=h;

function closeDetail(){document.getElementById("modal").classList.remove("show");}
document.getElementById("modal").onclick=function(e){if(e.target===this)closeDetail();};

function showDetail(idx){
  var k=K[idx];var mc=document.getElementById("modal-content");var d="";
  var sc=skorColor(k.skor);
  
  // HEADER
  d+="<div style=\"display:flex;align-items:center;gap:16px;margin-bottom:16px\">";
  d+="<div class=\"gk-circle\" style=\"border:3px solid "+sc+";color:"+sc+";width:80px;height:80px;font-size:28px\">"+k.skor+"</div>";
  d+="<div><div style=\"font-size:22px;font-weight:700\">"+k.ad+"</div>";
  d+="<div class=\"gk-badge "+badgeCls(k.skor_sinif)+"\" style=\"margin-top:4px\">"+badgeText(k.skor_sinif)+"</div></div></div>";
  
  // KPI ROW
  d+="<div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0\">";
  var kpis=[["Ciro",fmtTL(k.toplam_ciro)],["M\u00fc\u015fteri",k.toplam_kisi],["Ki\u015fi Ba\u015f\u0131",fmtTL(k.kisi_basi)],["Ort. G\u00fcnl\u00fck",fmtTL(k.ort_gunluk)],["Pay","%"+k.ciro_payi]];
  kpis.forEach(function(p){d+="<div style=\"background:var(--sf);border-radius:8px;padding:8px;text-align:center\"><div style=\"font-size:15px;font-weight:600\">"+p[1]+"</div><div style=\"font-size:9px;color:var(--tx3);margin-top:2px\">"+p[0]+"</div></div>";});
  d+="</div>";
  
  // GUNLUK TREND CHART
  d+="<div class=\"chart-box\"><div style=\"font-size:13px;font-weight:600;margin-bottom:8px\">G\u00fcnl\u00fck Ciro Trendi</div><canvas id=\"chart-trend\" height=\"150\"></canvas></div>";
  
  // SAAT CHART
  d+="<div class=\"chart-box\"><div style=\"font-size:13px;font-weight:600;margin-bottom:8px\">Saat Bazl\u0131 Verimlilik</div><canvas id=\"chart-saat\" height=\"130\"></canvas></div>";
  
  // TOP URUNLER + MASALAR yan yana
  d+="<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">";
  // Ürünler
  d+="<div class=\"chart-box\"><div style=\"font-size:13px;font-weight:600;margin-bottom:8px\">En \u00c7ok Satt\u0131\u011f\u0131 \u00dcr\u00fcnler</div>";
  k.top_urunler.forEach(function(u,i){
    var mxt=k.top_urunler[0].tutar||1;
    d+="<div style=\"display:flex;align-items:center;gap:6px;margin:4px 0\"><div style=\"width:130px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">"+(i+1)+". "+u.urun+"</div><div class=\"gk-bar\" style=\"flex:1\"><div class=\"gk-bar-fill\" style=\"width:"+(u.tutar/mxt*100).toFixed(0)+"%;background:var(--gold)\"></div></div><div style=\"width:70px;font-size:10px;color:var(--tx2);text-align:right\">"+u.adet+"x "+fmtTL(u.tutar)+"</div></div>";
  });
  d+="</div>";
  // Masalar
  d+="<div class=\"chart-box\"><div style=\"font-size:13px;font-weight:600;margin-bottom:8px\">En \u00c7ok Kazand\u0131ran Masalar</div>";
  k.top_masalar.forEach(function(m,i){
    var mxm=k.top_masalar[0].tutar||1;
    d+="<div style=\"display:flex;align-items:center;gap:6px;margin:4px 0\"><div style=\"width:50px;font-size:11px;font-weight:500\">"+(i+1)+". "+m.masa+"</div><div class=\"gk-bar\" style=\"flex:1\"><div class=\"gk-bar-fill\" style=\"width:"+(m.tutar/mxm*100).toFixed(0)+"%;background:var(--blu)\"></div></div><div style=\"width:65px;font-size:10px;color:var(--tx2);text-align:right\">"+fmtTL(m.tutar)+"</div></div>";
  });
  d+="</div></div>";
  
  // KARSILASTIRMA
  d+="<div class=\"chart-box\"><div style=\"font-size:13px;font-weight:600;margin-bottom:8px\">Restoran Ortalamas\u0131na G\u00f6re</div>";
  var refKb=k.ref_kisi_basi;
  var kbPct=refKb>0?((k.kisi_basi/refKb-1)*100).toFixed(0):0;
  var kbCls=parseInt(kbPct)>=0?"gk-tag up":"gk-tag dn";
  d+="<div style=\"display:flex;justify-content:space-around;text-align:center\">";
  d+="<div><div style=\"font-size:18px;font-weight:700\">"+fmtTL(k.kisi_basi)+"</div><div style=\"font-size:10px;color:var(--tx3)\">Ki\u015fi Ba\u015f\u0131</div><span class=\""+kbCls+"\">"+(parseInt(kbPct)>=0?"+":"")+kbPct+"%</span></div>";
  d+="<div><div style=\"font-size:18px;font-weight:700\">%"+k.ikram_orani+"</div><div style=\"font-size:10px;color:var(--tx3)\">\u0130kram Oran\u0131</div>"+(k.ikram_orani>10?"<span class=\"gk-tag dn\">Y\u00fcksek</span>":"<span class=\"gk-tag up\">Normal</span>")+"</div>";
  d+="<div><div style=\"font-size:18px;font-weight:700\">"+k.iade_sayisi+"</div><div style=\"font-size:10px;color:var(--tx3)\">\u0130ade</div>"+(k.iade_sayisi>3?"<span class=\"gk-tag dn\">Dikkat</span>":"<span class=\"gk-tag up\">\u0130yi</span>")+"</div>";
  d+="</div></div>";
  
  // ICGORULER
  d+="<div style=\"margin-top:12px\">";
  if(k.guclu_yonler.length>0){
    d+="<div style=\"font-size:12px;font-weight:600;color:var(--grn);margin:8px 0 4px\">\ud83d\udcaa G\u00fc\u00e7l\u00fc Y\u00f6nler</div>";
    k.guclu_yonler.forEach(function(g){d+="<div class=\"insight good\">"+g+"</div>";});
  }
  if(k.iyilestirme.length>0){
    d+="<div style=\"font-size:12px;font-weight:600;color:var(--org);margin:8px 0 4px\">\ud83d\udccb \u0130yile\u015ftirme Alanlar\u0131</div>";
    k.iyilestirme.forEach(function(g){d+="<div class=\"insight warn\">"+g+"</div>";});
  }
  d+="</div>";
  
  mc.innerHTML=d;
  document.getElementById("modal").classList.add("show");
  
  // CHART.JS grafikleri
  setTimeout(function(){
    // Trend chart
    var ctx1=document.getElementById("chart-trend");
    if(ctx1){
      new Chart(ctx1,{type:"bar",data:{
        labels:k.gunluk_trend.map(function(g){return g.gun.substring(0,3)}),
        datasets:[{label:"Ciro",data:k.gunluk_trend.map(function(g){return g.ciro}),backgroundColor:k.gunluk_trend.map(function(g){return g.aktif?"rgba(52,211,153,0.7)":"rgba(90,99,128,0.3)"}),borderRadius:4}]
      },options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return fmt(v)},color:"#8B95B0"},grid:{color:"#2A3352"}},x:{ticks:{color:"#8B95B0"},grid:{display:false}}}}});
    }
    // Saat chart
    var ctx2=document.getElementById("chart-saat");
    if(ctx2){
      var sKeys=Object.keys(k.saatler).sort(function(a,b){return parseInt(a)-parseInt(b)});
      new Chart(ctx2,{type:"line",data:{
        labels:sKeys.map(function(s){return s+":00"}),
        datasets:[{label:"Sipari\u015f",data:sKeys.map(function(s){return k.saatler[s].siparis}),borderColor:"#60A5FA",backgroundColor:"rgba(96,165,250,0.1)",fill:true,tension:0.3,pointRadius:4}]
      },options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{color:"#8B95B0"},grid:{color:"#2A3352"}},x:{ticks:{color:"#8B95B0"},grid:{display:false}}}}});
    }
  },100);
}
</script></body></html>
